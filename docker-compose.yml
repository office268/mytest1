# Local PostgreSQL for development. Run: docker compose up -d
# Then set: DATABASE_URL=postgresql+psycopg://postgres:postgres@localhost:5432/appdb
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
