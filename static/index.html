<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Code Preview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #181825;
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }

    header h1 { font-size: 1rem; color: #cba6f7; font-weight: 600; }

    .lang-tabs { display: flex; gap: 4px; }

    .lang-tab {
      padding: 5px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.8rem;
      font-weight: 500;
      background: #313244;
      color: #a6adc8;
      transition: all 0.15s;
    }
    .lang-tab:hover { background: #45475a; }
    .lang-tab.active { background: #cba6f7; color: #1e1e2e; }

    .header-actions { margin-left: auto; display: flex; gap: 8px; }

    .btn {
      padding: 6px 14px;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.82rem;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-run  { background: #a6e3a1; color: #1e1e2e; }
    .btn-save { background: #89b4fa; color: #1e1e2e; }
    .btn-sidebar { background: #313244; color: #cdd6f4; }

    /* Main layout */
    .main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #181825;
      border-right: 1px solid #313244;
      display: flex;
      flex-direction: column;
      transition: width 0.2s;
      overflow: hidden;
      flex-shrink: 0;
    }
    .sidebar.collapsed { width: 0; }

    .sidebar-tabs {
      display: flex;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    .sidebar-tab {
      flex: 1;
      padding: 8px;
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      transition: color 0.15s;
    }
    .sidebar-tab:hover { color: #cdd6f4; }
    .sidebar-tab.active { color: #cba6f7; border-bottom: 2px solid #cba6f7; }

    .sidebar-panel { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    .sidebar-panel.active { display: flex; }

    .sidebar-actions {
      padding: 8px;
      border-bottom: 1px solid #313244;
      flex-shrink: 0;
    }
    .sidebar-actions button {
      width: 100%;
      padding: 5px;
      background: #313244;
      color: #cdd6f4;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.78rem;
    }
    .sidebar-actions button:hover { background: #45475a; }

    .list-container { flex: 1; overflow-y: auto; padding: 6px; }

    .list-item {
      padding: 8px 10px;
      border-radius: 6px;
      margin-bottom: 4px;
      background: #1e1e2e;
      cursor: pointer;
      border: 1px solid transparent;
      transition: border-color 0.15s;
    }
    .list-item:hover { border-color: #45475a; }

    .list-item-name {
      font-size: 0.82rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .list-item-meta {
      font-size: 0.7rem;
      color: #6c7086;
      margin-top: 2px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lang-badge {
      padding: 1px 6px;
      border-radius: 4px;
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      background: #313244;
      color: #cba6f7;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #6c7086;
      cursor: pointer;
      font-size: 0.75rem;
      padding: 0 2px;
    }
    .delete-btn:hover { color: #f38ba8; }

    .empty-hint {
      color: #45475a;
      font-size: 0.78rem;
      text-align: center;
      padding: 20px 10px;
      font-style: italic;
    }

    /* Editor + Preview */
    .workspace {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    .editor-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #313244;
    }

    .pane-label {
      font-size: 0.7rem;
      color: #6c7086;
      padding: 4px 10px;
      background: #181825;
      border-bottom: 1px solid #313244;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    #editor-container { flex: 1; }

    .preview-pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: #181825;
    }

    #preview-frame {
      flex: 1;
      border: none;
      background: #fff;
    }

    #output-box {
      flex: 1;
      padding: 14px;
      font-family: 'Cascadia Code', 'Fira Code', monospace;
      font-size: 0.85rem;
      white-space: pre-wrap;
      overflow: auto;
      background: #11111b;
      color: #cdd6f4;
    }

    .error-text { color: #f38ba8; }
    .success-text { color: #a6e3a1; }
    .hint { color: #585b70; font-style: italic; }

    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #181825;
      border: 1px solid #313244;
      border-radius: 10px;
      padding: 24px;
      width: 340px;
    }
    .modal h3 { margin-bottom: 14px; color: #cba6f7; }
    .modal input {
      width: 100%;
      padding: 8px 12px;
      background: #1e1e2e;
      border: 1px solid #45475a;
      border-radius: 6px;
      color: #cdd6f4;
      font-size: 0.9rem;
      margin-bottom: 14px;
    }
    .modal-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .modal-actions button {
      padding: 6px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.82rem;
    }
    .btn-confirm { background: #89b4fa; color: #1e1e2e; }
    .btn-cancel  { background: #313244; color: #cdd6f4; }
  </style>
</head>
<body>

<header>
  <h1>⚡ Code Preview</h1>
  <div class="lang-tabs">
    <button class="lang-tab active" data-lang="python">Python</button>
    <button class="lang-tab" data-lang="html">HTML</button>
    <button class="lang-tab" data-lang="css">CSS</button>
    <button class="lang-tab" data-lang="javascript">JavaScript</button>
    <button class="lang-tab" data-lang="react">React</button>
  </div>
  <div class="header-actions">
    <button class="btn btn-save" id="saveBtn">💾 Save</button>
    <button class="btn btn-run"  id="runBtn">▶ Run</button>
    <button class="btn btn-sidebar" id="sidebarToggle">☰ DB</button>
  </div>
</header>

<div class="main">
  <!-- Sidebar -->
  <div class="sidebar" id="sidebar">
    <div class="sidebar-tabs">
      <button class="sidebar-tab active" data-panel="snippets">Snippets</button>
      <button class="sidebar-tab" data-panel="history">History</button>
    </div>

    <!-- Snippets panel -->
    <div class="sidebar-panel active" id="panel-snippets">
      <div class="list-container" id="snippets-list">
        <div class="empty-hint">No snippets saved yet.</div>
      </div>
    </div>

    <!-- History panel -->
    <div class="sidebar-panel" id="panel-history">
      <div class="sidebar-actions">
        <button onclick="clearHistory()">🗑 Clear History</button>
      </div>
      <div class="list-container" id="history-list">
        <div class="empty-hint">No runs yet.</div>
      </div>
    </div>
  </div>

  <!-- Editor + Preview -->
  <div class="workspace">
    <div class="editor-pane">
      <div class="pane-label">Editor</div>
      <div id="editor-container"></div>
    </div>
    <div class="preview-pane">
      <div class="pane-label">Preview / Output</div>
      <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin" style="display:none"></iframe>
      <div id="output-box"><span class="hint">Press ▶ Run to execute your code...</span></div>
    </div>
  </div>
</div>

<!-- Save Modal -->
<div class="modal-overlay" id="saveModal">
  <div class="modal">
    <h3>💾 Save Snippet</h3>
    <input type="text" id="snippetName" placeholder="Snippet name..." />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-confirm" onclick="confirmSave()">Save</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>
<script>
require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } });

let editor;
let currentLang = 'python';

const STARTERS = {
  python: `# Python Example\nprint("Hello from Python!")\n\nfor i in range(5):\n    print(f"  Line {i + 1}")`,
  html: `<!DOCTYPE html>\n<html>\n<head>\n  <style>\n    body { font-family: sans-serif; padding: 20px; background: #f0f4ff; }\n    h1 { color: #6c63ff; }\n  </style>\n</head>\n<body>\n  <h1>Hello from HTML!</h1>\n  <p>Edit me and press Run.</p>\n</body>\n</html>`,
  css: `/* CSS Preview wraps your styles around a demo page */\nbody {\n  background: linear-gradient(135deg, #667eea, #764ba2);\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  height: 100vh;\n  margin: 0;\n}\n\nh1 {\n  color: white;\n  font-family: sans-serif;\n  font-size: 2rem;\n  text-shadow: 0 2px 10px rgba(0,0,0,0.3);\n}`,
  javascript: `// JavaScript Example\nconst items = ['Apple', 'Banana', 'Cherry'];\n\nconst list = document.createElement('ul');\nitems.forEach(item => {\n  const li = document.createElement('li');\n  li.textContent = item;\n  li.style.padding = '4px 0';\n  list.appendChild(li);\n});\n\ndocument.body.style.fontFamily = 'sans-serif';\ndocument.body.style.padding = '20px';\ndocument.body.appendChild(document.createElement('h2')).textContent = 'Fruit List';\ndocument.body.appendChild(list);`,
  react: `// React Example (JSX)\nfunction App() {\n  const [count, setCount] = React.useState(0);\n\n  return (\n    <div style={{ fontFamily: 'sans-serif', padding: 20, textAlign: 'center' }}>\n      <h2 style={{ color: '#61dafb' }}>React Counter</h2>\n      <p style={{ fontSize: 48, margin: '16px 0' }}>{count}</p>\n      <button\n        onClick={() => setCount(c => c + 1)}\n        style={{ padding: '8px 24px', fontSize: 16, borderRadius: 8,\n                 background: '#61dafb', border: 'none', cursor: 'pointer' }}\n      >\n        Click me!\n      </button>\n    </div>\n  );\n}\n\nReactDOM.createRoot(document.getElementById('root')).render(<App />);`
};

const MONACO_LANG_MAP = {
  python: 'python', html: 'html', css: 'css', javascript: 'javascript', react: 'javascript'
};

require(['vs/editor/editor.main'], function () {
  monaco.editor.defineTheme('catppuccin', {
    base: 'vs-dark', inherit: true, rules: [],
    colors: {
      'editor.background': '#1e1e2e',
      'editor.foreground': '#cdd6f4',
      'editorLineNumber.foreground': '#45475a',
      'editor.selectionBackground': '#313244',
    }
  });

  editor = monaco.editor.create(document.getElementById('editor-container'), {
    value: STARTERS.python,
    language: 'python',
    theme: 'catppuccin',
    fontSize: 14,
    minimap: { enabled: false },
    scrollBeyondLastLine: false,
    automaticLayout: true,
    tabSize: 2,
    wordWrap: 'on',
  });

  editor.addCommand(monaco.KeyMod.CtrlCmd | monaco.KeyCode.Enter, runCode);
});

// ---- Language tabs ----
document.querySelectorAll('.lang-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    if (editor) {
      monaco.editor.setModelLanguage(editor.getModel(), MONACO_LANG_MAP[currentLang]);
      editor.setValue(STARTERS[currentLang]);
    }
    clearPreview();
  });
});

// ---- Sidebar toggle ----
document.getElementById('sidebarToggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('collapsed');
});

// ---- Sidebar tabs ----
document.querySelectorAll('.sidebar-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.sidebar-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.sidebar-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('panel-' + btn.dataset.panel).classList.add('active');
    if (btn.dataset.panel === 'snippets') loadSnippets();
    if (btn.dataset.panel === 'history') loadHistory();
  });
});

// ---- Run ----
document.getElementById('runBtn').addEventListener('click', runCode);

function clearPreview() {
  document.getElementById('preview-frame').style.display = 'none';
  document.getElementById('output-box').style.display = 'block';
  document.getElementById('output-box').innerHTML = '<span class="hint">Press ▶ Run to execute your code...</span>';
}

async function runCode() {
  const code = editor ? editor.getValue() : '';
  if (currentLang === 'python') {
    await runPython(code);
  } else {
    runInFrame(code);
  }
}

async function runPython(code) {
  const outBox = document.getElementById('output-box');
  document.getElementById('preview-frame').style.display = 'none';
  outBox.style.display = 'block';
  outBox.innerHTML = '<span class="hint">Running...</span>';
  try {
    const res = await fetch('/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code, language: 'python' })
    });
    const data = await res.json();
    let html = '';
    if (data.stdout) html += `<span class="success-text">${escapeHtml(data.stdout)}</span>`;
    if (data.stderr) html += `<span class="error-text">${escapeHtml(data.stderr)}</span>`;
    if (!html) html = '<span class="hint">(no output)</span>';
    outBox.innerHTML = html;
    // Refresh history if panel is open
    if (document.getElementById('panel-history').classList.contains('active')) loadHistory();
  } catch (e) {
    outBox.innerHTML = `<span class="error-text">Network error: ${escapeHtml(e.message)}</span>`;
  }
}

function runInFrame(code) {
  const frame = document.getElementById('preview-frame');
  document.getElementById('output-box').style.display = 'none';
  frame.style.display = 'block';
  let srcdoc = '';
  if (currentLang === 'html') {
    srcdoc = code;
  } else if (currentLang === 'css') {
    srcdoc = `<!DOCTYPE html><html><head><style>${code}</style></head><body><h1>CSS Preview</h1><p>Your styles are applied here.</p></body></html>`;
  } else if (currentLang === 'javascript') {
    srcdoc = `<!DOCTYPE html><html><body><script>${code}<\/script></body></html>`;
  } else if (currentLang === 'react') {
    srcdoc = `<!DOCTYPE html>
<html><head>
  <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.development.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.development.js"><\/script>
  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7/babel.min.js"><\/script>
</head><body>
  <div id="root"></div>
  <script type="text/babel">${code}<\/script>
</body></html>`;
  }
  frame.srcdoc = srcdoc;
}

// ---- Save snippet ----
document.getElementById('saveBtn').addEventListener('click', () => {
  document.getElementById('snippetName').value = '';
  document.getElementById('saveModal').classList.add('open');
  setTimeout(() => document.getElementById('snippetName').focus(), 50);
});

document.getElementById('snippetName').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmSave();
  if (e.key === 'Escape') closeModal();
});

function closeModal() {
  document.getElementById('saveModal').classList.remove('open');
}

async function confirmSave() {
  const name = document.getElementById('snippetName').value.trim();
  if (!name) return;
  const code = editor ? editor.getValue() : '';
  await fetch('/snippets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ name, language: currentLang, code })
  });
  closeModal();
  if (document.getElementById('panel-snippets').classList.contains('active')) loadSnippets();
}

// ---- Load snippets ----
async function loadSnippets() {
  const res = await fetch('/snippets');
  const data = await res.json();
  const container = document.getElementById('snippets-list');
  if (!data.length) {
    container.innerHTML = '<div class="empty-hint">No snippets saved yet.</div>';
    return;
  }
  container.innerHTML = data.map(s => `
    <div class="list-item" onclick="loadSnippet(${s.id})">
      <div class="list-item-name">${escapeHtml(s.name)}</div>
      <div class="list-item-meta">
        <span class="lang-badge">${s.language}</span>
        <span>${formatDate(s.created_at)}</span>
        <button class="delete-btn" onclick="event.stopPropagation(); deleteSnippet(${s.id})">✕</button>
      </div>
    </div>`).join('');
}

async function loadSnippet(id) {
  const res = await fetch(`/snippets/${id}`);
  const s = await res.json();
  // Switch language tab
  document.querySelectorAll('.lang-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === s.language);
  });
  currentLang = s.language;
  if (editor) {
    monaco.editor.setModelLanguage(editor.getModel(), MONACO_LANG_MAP[currentLang]);
    editor.setValue(s.code);
  }
  clearPreview();
}

async function deleteSnippet(id) {
  await fetch(`/snippets/${id}`, { method: 'DELETE' });
  loadSnippets();
}

// ---- History ----
async function loadHistory() {
  const res = await fetch('/history');
  const data = await res.json();
  const container = document.getElementById('history-list');
  if (!data.length) {
    container.innerHTML = '<div class="empty-hint">No runs yet.</div>';
    return;
  }
  container.innerHTML = data.map(r => `
    <div class="list-item" onclick="loadFromHistory(${JSON.stringify(r).replace(/"/g,'&quot;')})">
      <div class="list-item-name" style="font-size:0.75rem;color:#a6adc8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
        ${escapeHtml((r.code || '').split('\n')[0].slice(0, 60))}
      </div>
      <div class="list-item-meta">
        <span class="lang-badge">${r.language}</span>
        <span>${formatDate(r.created_at)}</span>
      </div>
    </div>`).join('');
}

function loadFromHistory(r) {
  document.querySelectorAll('.lang-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.lang === r.language);
  });
  currentLang = r.language;
  if (editor) {
    monaco.editor.setModelLanguage(editor.getModel(), MONACO_LANG_MAP[currentLang]);
    editor.setValue(r.code || '');
  }
  clearPreview();
}

async function clearHistory() {
  await fetch('/history', { method: 'DELETE' });
  loadHistory();
}

// ---- Utils ----
function escapeHtml(str) {
  return String(str || '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function formatDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
}

// Load snippets on start
window.addEventListener('load', loadSnippets);
</script>
</body>
</html>
